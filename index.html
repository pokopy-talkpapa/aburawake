<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>あぶらわけ - たねまき</title>
<style>
  :root{
    --teal:#4DBCBC;
    --orange:#F7931E;
    --brown:#3C2415;
    --water:#4DBCBC;
    --bg:#FFF8EF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; height:100%; overflow:hidden; touch-action:none; font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif; background:var(--bg); color:var(--brown);}
  #app{position:relative; width:100vw; height:100vh; display:flex; flex-direction:column;}

  /* ---------- Header ---------- */
  #header{display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.08); z-index:20; flex-wrap:wrap; gap:8px;}
  #titleWrap{display:flex; align-items:center; gap:10px;}
  #titleWrap h1{font-size:18px; margin:0;}
  #levelBadge{font-size:13px; background:var(--teal); color:#fff; border-radius:12px; padding:3px 10px;}
  #goalText{font-size:15px; font-weight:bold; color:var(--orange);}
  #controls{display:flex; gap:8px; align-items:center;}
  button{font-family:inherit; font-size:14px; border:none; border-radius:10px; padding:8px 12px; cursor:pointer; background:var(--teal); color:#fff; box-shadow:0 2px 0 rgba(0,0,0,0.15);}
  button:active{transform:translateY(1px); box-shadow:none;}
  button.secondary{background:#fff; color:var(--brown); border:2px solid var(--teal);}
  button.orange{background:var(--orange);}
  button:disabled{opacity:0.4; cursor:default;}

  /* ---------- Level select ---------- */
  #levelSelect{position:absolute; inset:0; background:var(--bg); z-index:30; overflow-y:auto; padding:20px; display:none;}
  #levelSelect.show{display:block;}
  #levelSelect h2{text-align:center; color:var(--brown); margin:6px 0;}
  .levelSelectHeader{display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:10px;}
  .levelGroup{margin-bottom:18px;}
  .levelGroup h3{color:var(--teal); font-size:14px; margin:6px 4px;}
  .levelGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;}
  .levelCard{background:#fff; border-radius:14px; padding:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); cursor:pointer; border:2px solid transparent;}
  .levelCard.cleared{border-color:var(--orange);}
  .levelCard.perfect{border-color:#FFD700; background:#FFFBEA;}
  .levelCard h4{margin:0 0 6px 0; font-size:15px;}
  .levelCard p{margin:0; font-size:12px; color:#888;}
  .levelCard p.best{margin-top:4px; color:var(--orange); font-weight:bold;}
  .star{color:var(--orange);}
  .trophy{color:#DAA520;}

  /* ---------- Play area ---------- */
  #playArea{position:relative; flex:1; overflow:hidden;}
  #stage{position:absolute; inset:0;}

  .container{
    position:absolute; width:auto; touch-action:none; user-select:none;
    display:flex; flex-direction:column; align-items:center; cursor:grab;
  }
  .container.dragging{cursor:grabbing; z-index:50; filter:drop-shadow(0 6px 10px rgba(0,0,0,0.3));}
  .flask{
    position:relative; border:4px solid var(--brown);
    border-top:none; border-radius:0 0 16px 16px; background:rgba(255,255,255,0.5);
    overflow:hidden;
  }
  .flaskTop{height:8px; margin-bottom:-4px; border:4px solid var(--brown); border-bottom:none; border-radius:6px 6px 0 0; background:#fff;}
  .water{position:absolute; bottom:0; left:0; right:0; background:var(--water); transition:height 0.6s cubic-bezier(.4,1.4,.6,1);}
  .waterTop{position:absolute; top:0; left:0; right:0; height:6px; background:rgba(255,255,255,0.5);}
  .pourStream{position:fixed; width:6px; background:linear-gradient(var(--water), var(--teal)); border-radius:3px; opacity:0; z-index:55; pointer-events:none;}
  .pourStream.show{animation:streamFlow 0.55s ease-in-out;}
  @keyframes streamFlow{
    0%{opacity:0;}
    15%{opacity:0.9;}
    80%{opacity:0.9;}
    100%{opacity:0;}
  }
  .ticks{position:absolute; inset:0; pointer-events:none;}
  .tick{position:absolute; left:0; right:0; height:1px; background:rgba(60,36,21,0.35); display:flex; align-items:center;}
  .tick span{font-size:9px; color:var(--brown); margin-left:3px; background:rgba(255,255,255,0.7); border-radius:3px; padding:0 2px;}
  .label{margin-top:6px; font-size:12px; font-weight:bold; text-align:center; white-space:nowrap;}
  .readout{font-size:13px; font-weight:bold; color:var(--teal); min-height:16px;}

  .dropzone{position:absolute; display:flex; flex-direction:column; align-items:center; width:90px;}
  .dropzone .icon{font-size:40px; line-height:1;}
  .dropzone .dzLabel{font-size:12px; margin-top:4px; font-weight:bold;}
  .dropzone.hover .icon{transform:scale(1.15);}

  #successOverlay{position:absolute; inset:0; background:rgba(255,255,255,0.9); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:60;}
  #successOverlay.show{display:flex;}
  #successOverlay .big{font-size:56px;}
  #successOverlay #successLevelBadge{font-size:13px; background:var(--teal); color:#fff; border-radius:12px; padding:3px 12px; margin-bottom:8px;}
  #successOverlay #successLevelTitle{font-size:15px; color:var(--brown); font-weight:bold; margin:0 0 4px;}
  #successOverlay h2{color:var(--orange); font-size:26px; margin:6px 0 10px;}
  #successOverlay #successMoves{font-size:16px; margin:0 0 4px;}
  #successOverlay #successBest{font-size:14px; color:var(--orange); font-weight:bold; margin:0 0 18px; min-height:18px;}
  #successOverlay #successBest.perfect{color:#DAA520;}

  #missionIntro{position:absolute; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:70; padding:24px; text-align:center;}
  #missionIntro.show{display:flex;}
  #missionIntro .badge{font-size:14px; background:var(--teal); color:#fff; border-radius:12px; padding:4px 14px; margin-bottom:14px;}
  #missionIntro h2{font-size:30px; margin:0 0 14px; color:var(--brown);}
  #missionIntro p{font-size:17px; color:var(--brown); max-width:520px; margin:0 0 24px;}

  .meterToggleLabel{font-size:12px; display:flex; align-items:center; gap:4px;}

  #shotPreview{position:fixed; inset:0; background:rgba(60,36,21,0.7); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:200; padding:20px;}
  #shotPreview.show{display:flex;}
  #shotPreview .shotCard{background:#fff; border-radius:16px; padding:16px; max-width:92vw; max-height:80vh; display:flex; flex-direction:column; align-items:center; gap:12px;}
  #shotPreview img{max-width:100%; max-height:50vh; border-radius:8px; border:2px solid var(--bg);}
  #shotPreview .shotBtns{display:flex; gap:10px;}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="titleWrap">
      <h1>🛢️ あぶらわけ</h1>
      <span id="levelBadge">-</span>
    </div>
    <div id="goalText"></div>
    <div id="controls">
      <label class="meterToggleLabel"><input type="checkbox" id="meterToggle"> めもりをみる</label>
      <button class="secondary" id="shotBtn">📸 スクショ</button>
      <button class="secondary" id="resetBtn">🔄 やりなおす</button>
      <button class="secondary" id="levelBtn">📋 もんだい</button>
    </div>
  </div>

  <div id="playArea">
    <div id="stage"></div>
    <div id="successOverlay">
      <div id="successLevelBadge">-</div>
      <div id="successLevelTitle">-</div>
      <div class="big">🎉</div>
      <h2>できた！</h2>
      <div id="successMoves"></div>
      <div id="successBest"></div>
      <button class="orange" id="nextBtn">つぎのもんだいへ ▶</button>
    </div>
    <div id="missionIntro">
      <div class="badge" id="missionIntroBadge">-</div>
      <h2 id="missionIntroTitle">-</h2>
      <p id="missionIntroDesc"></p>
      <button class="orange" id="missionIntroStart">はじめる ▶</button>
    </div>
  </div>

  <div id="shotPreview">
    <div class="shotCard">
      <img id="shotPreviewImg" alt="スクショ">
      <div class="shotBtns">
        <button class="orange" id="shotSaveBtn">📤 ほぞんする</button>
        <button class="secondary" id="shotCloseBtn">✕ とじる</button>
      </div>
    </div>
  </div>

  <div id="levelSelect">
    <div class="levelSelectHeader">
      <h2>🛢️ あぶらわけ - もんだいをえらぼう</h2>
      <button class="secondary" id="progressResetBtn">🗑️ きろくをリセット</button>
    </div>
    <div id="levelGroups"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* =========================================================
   あぶらわけ - 容器を「そそぐ／みたす／すてる」で
   目標の量をぴったり作る、油分け算シミュレーター
   ========================================================= */

const LEVELS = [
  // --- かんたん ---
  {
    id: 1, group: "かんたん", title:"1dLをつくろう",
    desc:"すいどうから 1dLカップに、ちょうど1dL いれよう。",
    containers:[ {id:'a', capacity:1, amount:0, x:0.5, label:'1dLカップ'} ],
    goal:{id:'a', amount:1},
  },
  {
    id: 2, group: "かんたん", title:"2dLをつくろう",
    desc:"すいどうから 2dLカップに、ちょうど2dL いれよう。",
    containers:[ {id:'a', capacity:2, amount:0, x:0.5, label:'2dLカップ'} ],
    goal:{id:'a', amount:2},
  },
  {
    id: 3, group: "かんたん", title:"3dLをつくろう",
    desc:"1dLカップと2dLカップを つかって、5dLの大きい入れ物に ちょうど3dL つくろう。",
    containers:[
      {id:'a', capacity:1, amount:0, x:0.22, label:'1dLカップ'},
      {id:'b', capacity:2, amount:0, x:0.5, label:'2dLカップ'},
      {id:'c', capacity:5, amount:0, x:0.78, label:'大きい入れ物（5dL）'},
    ],
    goal:{id:'c', amount:3},
  },
  {
    id: 4, group: "かんたん", title:"4dLをつくろう",
    desc:"2dLカップを つかって、5dLの大きい入れ物に ちょうど4dL つくろう。",
    containers:[
      {id:'a', capacity:2, amount:0, x:0.3, label:'2dLカップ'},
      {id:'c', capacity:5, amount:0, x:0.7, label:'大きい入れ物（5dL）'},
    ],
    goal:{id:'c', amount:4},
  },
  // --- ちゅうくらい ---
  {
    id: 5, group: "ちゅうくらい", title:"3dLをつくろう",
    desc:"5dLの入れ物と2dLカップを つかって、ちょうど3dL つくろう。",
    containers:[
      {id:'a', capacity:5, amount:0, x:0.3, label:'5dLの入れ物'},
      {id:'b', capacity:2, amount:0, x:0.65, label:'2dLカップ'},
    ],
    goal:{id:'a', amount:3},
  },
  {
    id: 6, group: "ちゅうくらい", title:"2dLをつくろう",
    desc:"6dLの入れ物と4dLカップを つかって、ちょうど2dL つくろう。",
    containers:[
      {id:'a', capacity:6, amount:0, x:0.3, label:'6dLの入れ物'},
      {id:'b', capacity:4, amount:0, x:0.65, label:'4dLカップ'},
    ],
    goal:{id:'a', amount:2},
  },
  {
    id: 9, group: "ちゅうくらい", title:"1dLをつくろう",
    desc:"7dLの入れ物と3dLカップを つかって、ちょうど1dL つくろう。",
    containers:[
      {id:'a', capacity:7, amount:0, x:0.3, label:'7dLの入れ物'},
      {id:'b', capacity:3, amount:0, x:0.65, label:'3dLカップ'},
    ],
    goal:{id:'a', amount:1},
  },
  {
    id: 10, group: "ちゅうくらい", title:"4dLをつくろう",
    desc:"5dLの入れ物と3dLカップを つかって、ちょうど4dL つくろう。",
    containers:[
      {id:'a', capacity:5, amount:0, x:0.3, label:'5dLの入れ物'},
      {id:'b', capacity:3, amount:0, x:0.65, label:'3dLカップ'},
    ],
    goal:{id:'a', amount:4},
  },
  {
    id: 11, group: "ちゅうくらい", title:"1dLをつくろう（7dLと4dL）",
    desc:"7dLの入れ物と4dLカップを つかって、ちょうど1dL つくろう。",
    containers:[
      {id:'a', capacity:7, amount:0, x:0.3, label:'7dLの入れ物'},
      {id:'b', capacity:4, amount:0, x:0.65, label:'4dLカップ'},
    ],
    goal:{id:'a', amount:1},
  },
  // --- 本格：油分け算 ---
  {
    id: 7, group: "ほんかく油分け", title:"8dLを4dLと4dLに分けよう",
    desc:"8dLいっぱいのたる・5dLマス・3dLマス（からっぽ）だけを つかって、ちょうど4dLずつに分けよう。",
    containers:[
      {id:'a', capacity:8, amount:8, x:0.2, label:'8dL たる'},
      {id:'b', capacity:5, amount:0, x:0.5, label:'5dLマス'},
      {id:'c', capacity:3, amount:0, x:0.8, label:'3dLマス'},
    ],
    goal:[{id:'a', amount:4}, {id:'b', amount:4}],
  },
  {
    id: 8, group: "ほんかく油分け", title:"10dLを5dLと5dLに分けよう",
    desc:"10dLいっぱいのたる・7dLマス・3dLマス（からっぽ）だけを つかって、ちょうど5dLずつに分けよう。",
    containers:[
      {id:'a', capacity:10, amount:10, x:0.2, label:'10dL たる'},
      {id:'b', capacity:7, amount:0, x:0.5, label:'7dLマス'},
      {id:'c', capacity:3, amount:0, x:0.8, label:'3dLマス'},
    ],
    goal:[{id:'a', amount:5}, {id:'b', amount:5}],
  },
];
LEVELS.forEach((l, i) => { l.num = i + 1; });

const TAP = {id:'__tap', label:'すいどう'};
const SINK = {id:'__sink', label:'すてる'};

let state = null; // current level runtime state
let progress = JSON.parse(localStorage.getItem('aburawake_progress') || '{}');
Object.keys(progress).forEach(id => {
  if(progress[id] === true) progress[id] = {cleared:true, best:null};
});

const stage = document.getElementById('stage');
const goalText = document.getElementById('goalText');
const levelBadge = document.getElementById('levelBadge');
const meterToggle = document.getElementById('meterToggle');
const successOverlay = document.getElementById('successOverlay');
const successLevelBadge = document.getElementById('successLevelBadge');
const successLevelTitle = document.getElementById('successLevelTitle');
const successMoves = document.getElementById('successMoves');
const successBest = document.getElementById('successBest');
const levelSelect = document.getElementById('levelSelect');
const levelGroups = document.getElementById('levelGroups');
const missionIntro = document.getElementById('missionIntro');
const missionIntroBadge = document.getElementById('missionIntroBadge');
const missionIntroTitle = document.getElementById('missionIntroTitle');
const missionIntroDesc = document.getElementById('missionIntroDesc');

function saveProgress(){
  try { localStorage.setItem('aburawake_progress', JSON.stringify(progress)); }
  catch(e) { /* localStorage unavailable, ignore */ }
}

// BFS: そそぐ/みたす/すてる と同じ操作ルールで、ゴールまでの最短手数を求める
const optimalCache = {};
function getOptimalMoves(id){
  if(id in optimalCache) return optimalCache[id];
  const def = LEVELS.find(l => l.id === id);
  const conts = def.containers;
  const n = conts.length;
  const capacities = conts.map(c => c.capacity);
  const start = conts.map(c => c.amount);
  const goal = (Array.isArray(def.goal) ? def.goal : [def.goal])
    .map(g => ({idx: conts.findIndex(c => c.id === g.id), amount: g.amount}));
  const isGoal = arr => goal.every(g => arr[g.idx] === g.amount);
  const key = arr => arr.join(',');

  let result = null;
  if(isGoal(start)){
    result = 0;
  } else {
    const visited = new Set([key(start)]);
    let queue = [start];
    let steps = 0;
    outer:
    while(queue.length){
      steps++;
      const next = [];
      for(const s of queue){
        const moves = [];
        for(let i=0;i<n;i++){
          if(s[i] < capacities[i]){ const m = s.slice(); m[i] = capacities[i]; moves.push(m); }
          if(s[i] > 0){ const m = s.slice(); m[i] = 0; moves.push(m); }
          for(let j=0;j<n;j++){
            if(i===j) continue;
            if(s[i] > 0 && s[j] < capacities[j]){
              const amt = Math.min(s[i], capacities[j]-s[j]);
              const m = s.slice(); m[i]-=amt; m[j]+=amt; moves.push(m);
            }
          }
        }
        for(const m of moves){
          const k = key(m);
          if(visited.has(k)) continue;
          if(isGoal(m)){ result = steps; break outer; }
          visited.add(k);
          next.push(m);
        }
      }
      queue = next;
    }
  }
  optimalCache[id] = result;
  return result;
}

Object.keys(progress).forEach(id => {
  const p = progress[id];
  if(p && p.cleared && typeof p.best === 'number' && !p.perfect){
    const optimal = getOptimalMoves(Number(id));
    if(optimal !== null && p.best === optimal) p.perfect = true;
  }
});

function buildLevelSelect(){
  levelGroups.innerHTML = '';
  const groups = {};
  LEVELS.forEach(l => { (groups[l.group] = groups[l.group]||[]).push(l); });
  Object.keys(groups).forEach(gname => {
    const wrap = document.createElement('div');
    wrap.className = 'levelGroup';
    const h3 = document.createElement('h3');
    h3.textContent = gname;
    wrap.appendChild(h3);
    const grid = document.createElement('div');
    grid.className = 'levelGrid';
    groups[gname].forEach(l => {
      const p = progress[l.id];
      const card = document.createElement('div');
      card.className = 'levelCard' + (p && p.cleared ? ' cleared' : '') + (p && p.perfect ? ' perfect' : '');
      const bestHtml = (p && p.cleared && typeof p.best === 'number')
        ? `<p class="best">さいしょう ${p.best}かい${p.perfect ? ' 🏆さいたん！' : ''}</p>` : '';
      const badges = (p && p.perfect ? '<span class="trophy">🏆</span> ' : '') + (p && p.cleared ? '<span class="star">★</span> ' : '');
      card.innerHTML = `<h4>${badges}${l.title}</h4><p>${l.desc}</p>${bestHtml}`;
      card.onclick = () => { loadLevel(l.id); levelSelect.classList.remove('show'); };
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
    levelGroups.appendChild(wrap);
  });
}

function loadLevel(id){
  const def = LEVELS.find(l => l.id === id);
  state = {
    def,
    containers: def.containers.map(c => ({...c})),
    moveCount: 0,
  };
  levelBadge.textContent = def.title;
  goalText.textContent = `🎯 ${def.desc}`;
  successOverlay.classList.remove('show');
  renderStage();
}

function beginMission(id){
  const def = LEVELS.find(l => l.id === id);
  missionIntroBadge.textContent = def.group;
  missionIntroTitle.textContent = def.title;
  missionIntroDesc.textContent = def.desc;
  missionIntro.dataset.nextId = id;
  levelBadge.textContent = def.title;
  goalText.textContent = `🎯 ${def.desc}`;
  successOverlay.classList.remove('show');
  missionIntro.classList.add('show');
}

function renderStage(){
  stage.innerHTML = '';

  // dropzones: tap (top-left) and sink (top-right)
  const tapEl = makeDropzone(TAP, '🚰', 0.06, 0.10);
  stage.appendChild(tapEl);
  positionEl(tapEl, 0.06, 0.10);
  const sinkEl = makeDropzone(SINK, '🗑️', 0.94, 0.10);
  stage.appendChild(sinkEl);
  positionEl(sinkEl, 0.94, 0.10);

  state.containers.forEach(c => {
    const el = makeContainer(c);
    stage.appendChild(el);
    positionEl(el, c.x, 0.42);
  });
}

function makeDropzone(def, icon, xFrac, yFrac){
  const el = document.createElement('div');
  el.className = 'dropzone';
  el.dataset.zoneId = def.id;
  el.innerHTML = `<div class="icon">${icon}</div><div class="dzLabel">${def.label}</div>`;
  return el;
}

function positionEl(el, xFrac, yFrac){
  const rect = stage.getBoundingClientRect();
  el.style.left = (rect.width * xFrac - el.offsetWidth/2) + 'px';
  el.style.top = (rect.height * yFrac) + 'px';
}

function sizeForCapacity(capacity){
  const height = Math.min(220, 50 + capacity * 12);
  const width = Math.min(140, 44 + capacity * 7);
  return {width, height};
}

function makeContainer(c){
  const el = document.createElement('div');
  el.className = 'container';
  el.dataset.id = c.id;

  const {width, height} = sizeForCapacity(c.capacity);

  const top = document.createElement('div');
  top.className = 'flaskTop';
  top.style.width = (width + 8) + 'px';
  el.appendChild(top);

  const flask = document.createElement('div');
  flask.className = 'flask';
  flask.style.width = width + 'px';
  flask.style.height = height + 'px';

  const water = document.createElement('div');
  water.className = 'water';
  const waterTop = document.createElement('div');
  waterTop.className = 'waterTop';
  water.appendChild(waterTop);
  flask.appendChild(water);

  const ticks = document.createElement('div');
  ticks.className = 'ticks';
  for(let i=1;i<c.capacity;i++){
    const t = document.createElement('div');
    t.className = 'tick';
    t.style.bottom = (i / c.capacity * 100) + '%';
    t.innerHTML = `<span>${i}</span>`;
    ticks.appendChild(t);
  }
  flask.appendChild(ticks);
  el.appendChild(flask);

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = c.label;
  el.appendChild(label);

  const readout = document.createElement('div');
  readout.className = 'readout';
  el.appendChild(readout);

  updateContainerVisual(c, el);
  attachDrag(el, c);
  return el;
}

function updateContainerVisual(c, el){
  el = el || stage.querySelector(`.container[data-id="${c.id}"]`);
  if(!el) return;
  const water = el.querySelector('.water');
  const pct = Math.max(0, Math.min(100, (c.amount / c.capacity) * 100));
  water.style.height = pct + '%';
  const ticks = el.querySelector('.ticks');
  const readout = el.querySelector('.readout');
  const showMeter = meterToggle.checked;
  ticks.style.opacity = showMeter ? '1' : '0';
  readout.textContent = showMeter ? `${c.amount}dL / ${c.capacity}dL` : '';
}

function refreshAll(){
  state.containers.forEach(c => updateContainerVisual(c));
}

meterToggle.addEventListener('change', refreshAll);

/* ---------- drag & drop logic ---------- */
function attachDrag(el, containerDef){
  let dragging = false, offsetX=0, offsetY=0, startX=0, startY=0;

  const onDown = (e) => {
    e.preventDefault();
    const point = getPoint(e);
    const rect = el.getBoundingClientRect();
    offsetX = point.x - rect.left;
    offsetY = point.y - rect.top;
    startX = point.x; startY = point.y;
    dragging = true;
    el.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);
  };

  const onMove = (e) => {
    if(!dragging) return;
    e.preventDefault();
    const point = getPoint(e);
    const stageRect = stage.getBoundingClientRect();
    el.style.left = (point.x - stageRect.left - offsetX) + 'px';
    el.style.top = (point.y - stageRect.top - offsetY) + 'px';
    highlightTarget(point);
    checkHoverFill(point, el, containerDef);
  };

  const onUp = (e) => {
    if(!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchend', onUp);
    clearHighlight();

    const point = getLastPoint(e);
    const target = findDropTarget(point, el);
    const homeC = state.containers.find(c => c.id === containerDef.id);

    if(target){
      const targetEl = target.type === 'container'
        ? stage.querySelector(`.container[data-id="${target.id}"]`)
        : stage.querySelector(`.dropzone[data-zone-id="${target.id}"]`);
      if(target.type === 'container' && targetEl){
        positionAboveTarget(el, targetEl);
      }
      const poured = performPour(containerDef, target);
      if(poured && targetEl){
        animatePour(el, targetEl);
        setTimeout(() => positionEl(el, homeC.x, 0.42), 600);
        return;
      }
    }
    // snap back to home slot
    positionEl(el, homeC.x, 0.42);
  };

  el.addEventListener('mousedown', onDown);
  el.addEventListener('touchstart', onDown, {passive:false});
}

function positionAboveTarget(sourceEl, targetEl){
  const stageRect = stage.getBoundingClientRect();
  const targetRect = targetEl.getBoundingClientRect();
  const sourceRect = sourceEl.getBoundingClientRect();
  const left = targetRect.left + targetRect.width/2 - stageRect.left - sourceRect.width/2;
  const top = Math.max(0, targetRect.top - stageRect.top - sourceRect.height - 14);
  sourceEl.style.left = left + 'px';
  sourceEl.style.top = top + 'px';
}

function checkHoverFill(point, el, containerDef){
  const target = findDropTarget(point, el);
  if(!target || target.type !== 'zone' || target.id !== TAP.id) return;
  const source = state.containers.find(c => c.id === containerDef.id);
  if(!source || source.amount >= source.capacity) return;
  source.amount = source.capacity;
  state.moveCount = (state.moveCount||0) + 1;
  refreshAll();
  checkGoal();
  const tapEl = stage.querySelector(`.dropzone[data-zone-id="${TAP.id}"]`);
  if(tapEl) animatePour(tapEl, el);
}

function animatePour(sourceEl, targetEl){
  const sRect = sourceEl.getBoundingClientRect();
  const tRect = targetEl.getBoundingClientRect();

  const x1 = sRect.left + sRect.width/2;
  const y1 = sRect.top + sRect.height*0.55;
  const x2 = tRect.left + tRect.width/2;
  const y2 = tRect.top + tRect.height*0.25;
  const dx = x2-x1, dy = y2-y1;
  const dist = Math.max(10, Math.sqrt(dx*dx+dy*dy));
  const angle = Math.atan2(dy, dx) * 180/Math.PI - 90;

  const stream = document.createElement('div');
  stream.className = 'pourStream show';
  stream.style.left = x1 + 'px';
  stream.style.top = y1 + 'px';
  stream.style.height = dist + 'px';
  stream.style.transform = `rotate(${angle}deg)`;
  stream.style.transformOrigin = 'top center';
  document.body.appendChild(stream);
  setTimeout(() => stream.remove(), 600);
}

function getPoint(e){
  if(e.touches && e.touches[0]) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
  return {x:e.clientX, y:e.clientY};
}
function getLastPoint(e){
  if(e.changedTouches && e.changedTouches[0]) return {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY};
  return {x:e.clientX, y:e.clientY};
}

function findDropTarget(point, draggedEl){
  const els = document.elementsFromPoint(point.x, point.y);
  for(const cand of els){
    if(cand === draggedEl || draggedEl.contains(cand)) continue;
    const containerEl = cand.closest('.container');
    if(containerEl && containerEl !== draggedEl) return {type:'container', id: containerEl.dataset.id};
    const zoneEl = cand.closest('.dropzone');
    if(zoneEl) return {type:'zone', id: zoneEl.dataset.zoneId};
  }
  return null;
}

let hoverEl = null;
function highlightTarget(point){
  clearHighlight();
  const els = document.elementsFromPoint(point.x, point.y);
  for(const cand of els){
    const zoneEl = cand.closest('.dropzone');
    if(zoneEl){ zoneEl.classList.add('hover'); hoverEl = zoneEl; return; }
  }
}
function clearHighlight(){
  if(hoverEl){ hoverEl.classList.remove('hover'); hoverEl = null; }
}

function performPour(sourceDef, target){
  const source = state.containers.find(c => c.id === sourceDef.id);
  if(!source) return false;

  if(target.type === 'zone' && target.id === TAP.id){
    if(source.amount === source.capacity) return false;
    source.amount = source.capacity; // fill from tap
  } else if(target.type === 'zone' && target.id === SINK.id){
    if(source.amount === 0) return false;
    source.amount = 0; // dump out
  } else if(target.type === 'container'){
    const dest = state.containers.find(c => c.id === target.id);
    if(!dest) return false;
    const move = Math.min(source.amount, dest.capacity - dest.amount);
    if(move <= 0) return false;
    source.amount -= move;
    dest.amount += move;
  } else {
    return false;
  }
  state.moveCount = (state.moveCount||0) + 1;
  refreshAll();
  checkGoal();
  return true;
}

function checkGoal(){
  const conditions = Array.isArray(state.def.goal) ? state.def.goal : [state.def.goal];
  const allMet = conditions.every(g => {
    const c = state.containers.find(c => c.id === g.id);
    return c && c.amount === g.amount;
  });
  if(allMet){
    const moves = state.moveCount;
    const prev = progress[state.def.id];
    const prevBest = prev && typeof prev.best === 'number' ? prev.best : null;
    const isNewBest = prevBest === null || moves <= prevBest;
    const best = isNewBest ? moves : prevBest;
    const optimal = getOptimalMoves(state.def.id);
    const perfect = (prev && prev.perfect) || (optimal !== null && best === optimal);
    progress[state.def.id] = {cleared:true, best, perfect};
    saveProgress();
    const isPerfectRun = optimal !== null && moves === optimal;
    setTimeout(() => showSuccess(moves, isNewBest, isPerfectRun), 400);
  }
}

function showSuccess(moves, isNewBest, isPerfectRun){
  successLevelBadge.textContent = `レベル${state.def.num} / ${LEVELS.length}`;
  successLevelTitle.textContent = state.def.title;
  successMoves.textContent = `${moves}かいで うつしたよ`;
  successBest.classList.remove('perfect');
  if(isPerfectRun){
    successBest.textContent = '🏆 これいじょう すくなく できない、さいたんきろくだよ！';
    successBest.classList.add('perfect');
  } else if(isNewBest){
    successBest.textContent = '⭐️ ここまでで いちばん すくない かいすうだよ！';
  } else {
    successBest.textContent = '';
  }
  successOverlay.classList.add('show');
}

const shotPreview = document.getElementById('shotPreview');
const shotPreviewImg = document.getElementById('shotPreviewImg');
let pendingShot = null; // {blob, filename}

document.getElementById('shotBtn').onclick = () => {
  if(typeof html2canvas !== 'function') return;
  html2canvas(document.getElementById('playArea'), {backgroundColor:'#FFF8EF'}).then(canvas => {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const stamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
    const filename = `あぶらわけ_${stamp}.png`;
    canvas.toBlob(blob => {
      if(!blob) return;
      pendingShot = {blob, filename};
      if(shotPreviewImg.dataset.prevUrl) URL.revokeObjectURL(shotPreviewImg.dataset.prevUrl);
      const url = URL.createObjectURL(blob);
      shotPreviewImg.src = url;
      shotPreviewImg.dataset.prevUrl = url;
      shotPreview.classList.add('show');
    }, 'image/png');
  });
};

document.getElementById('shotCloseBtn').onclick = () => {
  shotPreview.classList.remove('show');
};

document.getElementById('shotSaveBtn').onclick = () => {
  if(!pendingShot) return;
  const {blob, filename} = pendingShot;
  const file = new File([blob], filename, {type:'image/png'});
  const fallbackDownload = (reason) => {
    showShotDebug('ファイル保存 (' + reason + ')');
    const link = document.createElement('a');
    link.download = filename;
    link.href = URL.createObjectURL(blob);
    link.click();
    setTimeout(() => URL.revokeObjectURL(link.href), 3000);
  };
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).then(() => {
      shotPreview.classList.remove('show');
    }).catch(err => {
      if(err && err.name === 'AbortError') return;
      fallbackDownload('共有失敗:' + (err && err.name));
      shotPreview.classList.remove('show');
    });
    return;
  }
  fallbackDownload('共有非対応');
  shotPreview.classList.remove('show');
};

function showShotDebug(text){
  let el = document.getElementById('shotDebug');
  if(!el){
    el = document.createElement('div');
    el.id = 'shotDebug';
    el.style.cssText = 'position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(60,36,21,0.9);color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;z-index:999;max-width:90vw;text-align:center;';
    document.body.appendChild(el);
  }
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => { el.style.display = 'none'; }, 6000);
}

document.getElementById('resetBtn').onclick = () => { if(state) loadLevel(state.def.id); };
document.getElementById('progressResetBtn').onclick = () => {
  if(!confirm('いままでの ★や🏆の きろくを ぜんぶ けしますか？')) return;
  progress = {};
  saveProgress();
  buildLevelSelect();
};
document.getElementById('levelBtn').onclick = () => {
  missionIntro.classList.remove('show');
  successOverlay.classList.remove('show');
  buildLevelSelect();
  levelSelect.classList.add('show');
};
document.getElementById('nextBtn').onclick = () => {
  const idx = LEVELS.findIndex(l => l.id === state.def.id);
  const next = LEVELS[idx+1];
  if(next) beginMission(next.id);
  else { buildLevelSelect(); levelSelect.classList.add('show'); }
};
document.getElementById('missionIntroStart').onclick = () => {
  missionIntro.classList.remove('show');
  loadLevel(Number(missionIntro.dataset.nextId));
};

window.addEventListener('resize', () => { if(state) renderStage(); });

// init
buildLevelSelect();
beginMission(1);
</script>
